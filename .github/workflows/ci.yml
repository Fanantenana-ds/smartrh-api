name: CI Quality Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4a4bfb4e5a5c5c5c5c5c5c5c5c5c5c5c5c5c5c5c
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm test -- --coverage
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@f2c0b7b6dfe7b6b6a8e9c0d1e2f3a4b5c6d7e8f9
        with:
          args: >
            -Dsonar.projectKey=Fanantenana-ds_smartrh-api
            -Dsonar.organization=fanantenana-ds
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.javascript.node.maxspace=4096
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
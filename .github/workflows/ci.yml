name: CI Quality Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --ignore-scripts
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm test -- --coverage
      
      - name: Clean Sonar cache
        run: rm -rf .scannerwork
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@4b4d7634dab97dcee0b75763a54a6dc92a9e6bc1
        with:
          args: >
            -Dsonar.projectKey=Fanantenana-ds_smartrh-api
            -Dsonar.organization=fanantenana-ds
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}